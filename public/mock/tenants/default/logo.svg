<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2f6d4a"/>
      <stop offset="100%" style="stop-color:#1f4d34"/>
    </linearGradient>
  </defs>
  
  <!-- Cupcake icon -->
  <g transform="translate(10, 8)">
    <!-- Cupcake base -->
    <path d="M8 35 L14 60 L50 60 L56 35 Z" fill="#d4a574" stroke="#8b6914" stroke-width="1.5"/>
    <!-- Cupcake wrapper lines -->
    <line x1="18" y1="38" x2="22" y2="58" stroke="#c4956a" stroke-width="1"/>
    <line x1="28" y1="38" x2="30" y2="58" stroke="#c4956a" stroke-width="1"/>
    <line x1="38" y1="38" x2="38" y2="58" stroke="#c4956a" stroke-width="1"/>
    <line x1="48" y1="38" x2="44" y2="58" stroke="#c4956a" stroke-width="1"/>
    <!-- Frosting -->
    <ellipse cx="32" cy="32" rx="26" ry="12" fill="#f8c8dc"/>
    <ellipse cx="32" cy="24" rx="20" ry="10" fill="#f4a7c0"/>
    <ellipse cx="32" cy="18" rx="14" ry="8" fill="#f08cb0"/>
    <circle cx="32" cy="12" r="6" fill="#ec6a9a"/>
    <!-- Cherry on top -->
    <circle cx="32" cy="6" r="5" fill="#e63946"/>
    <path d="M32 1 Q38 -2 40 4" stroke="#2d6a4f" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Text: Confettideli -->
  <text x="78" y="52" font-family="'DM Sans', Arial, sans-serif" font-size="36" font-weight="700" fill="url(#grad)">
    Confettideli
  </text>
</svg>
